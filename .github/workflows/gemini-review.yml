name: Gemini PR Review & Auto-Merge

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    if: "!github.event.pull_request.draft"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr_diff.txt
          # Truncate if too large (Gemini context limit)
          head -c 30000 /tmp/pr_diff.txt > /tmp/pr_diff_trimmed.txt
          echo "diff_size=$(wc -c < /tmp/pr_diff.txt)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR metadata
        id: meta
        run: |
          echo "title=${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
          echo "author=${{ github.event.pull_request.user.login }}" >> "$GITHUB_OUTPUT"
          echo "files_changed=${{ github.event.pull_request.changed_files }}" >> "$GITHUB_OUTPUT"
          echo "additions=${{ github.event.pull_request.additions }}" >> "$GITHUB_OUTPUT"
          echo "deletions=${{ github.event.pull_request.deletions }}" >> "$GITHUB_OUTPUT"

      - name: Gemini Review
        id: review
        run: |
          PR_DIFF=$(cat /tmp/pr_diff_trimmed.txt)
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q '.body')

          PROMPT=$(cat <<'PROMPT_EOF'
          You are a code reviewer for the loco-tunes project — a Next.js music generation app.
          Review this PR and respond with EXACTLY one JSON object (no markdown, no explanation outside JSON):

          {
            "decision": "APPROVE" | "REQUEST_CHANGES" | "ESCALATE",
            "summary": "1-2 sentence summary of what this PR does",
            "issues": ["list of specific issues found, empty if none"],
            "risk_level": "low" | "medium" | "high",
            "escalation_reason": "only if decision is ESCALATE — why this needs human review"
          }

          Decision criteria:
          - APPROVE: Clean code, tests pass context, no security issues, low-medium risk
          - REQUEST_CHANGES: Has fixable issues (type errors, missing tests, logic bugs)
          - ESCALATE: Architecture changes, security concerns, unclear intent, high risk, or changes to auth/payments/data-deletion

          Dependabot/dependency PRs: APPROVE if only lockfile + package.json version bumps, no breaking major versions.

          PR Title: ${PR_TITLE}
          PR Author: ${PR_AUTHOR}
          Files Changed: ${FILES_CHANGED} (+${ADDITIONS} -${DELETIONS})
          PR Description: ${PR_BODY}

          Diff:
          ${PR_DIFF}
          PROMPT_EOF
          )

          # Call Gemini API
          RESPONSE=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n --arg prompt "$PROMPT" '{
              "contents": [{"parts": [{"text": $prompt}]}],
              "generationConfig": {"temperature": 0.1, "maxOutputTokens": 1024}
            }')")

          # Extract the text response
          REVIEW_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "ERROR"')

          if [ "$REVIEW_TEXT" = "ERROR" ] || [ -z "$REVIEW_TEXT" ]; then
            echo "Gemini API error, escalating"
            echo "decision=ESCALATE" >> "$GITHUB_OUTPUT"
            echo "comment=Gemini review failed — API error. Manual review required." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract JSON from response (handle markdown code blocks)
          REVIEW_JSON=$(echo "$REVIEW_TEXT" | sed -n '/^{/,/^}/p' | head -20)
          if [ -z "$REVIEW_JSON" ]; then
            REVIEW_JSON=$(echo "$REVIEW_TEXT" | sed -n '/```json/,/```/p' | sed '1d;$d')
          fi
          if [ -z "$REVIEW_JSON" ]; then
            REVIEW_JSON="$REVIEW_TEXT"
          fi

          DECISION=$(echo "$REVIEW_JSON" | jq -r '.decision // "ESCALATE"')
          SUMMARY=$(echo "$REVIEW_JSON" | jq -r '.summary // "Review parsing failed"')
          RISK=$(echo "$REVIEW_JSON" | jq -r '.risk_level // "unknown"')
          ISSUES=$(echo "$REVIEW_JSON" | jq -r '.issues // [] | join("\n- ")')
          ESCALATION=$(echo "$REVIEW_JSON" | jq -r '.escalation_reason // ""')

          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"

          # Build comment
          if [ "$DECISION" = "APPROVE" ]; then
            ICON="✅"
          elif [ "$DECISION" = "REQUEST_CHANGES" ]; then
            ICON="🔧"
          else
            ICON="⚠️"
          fi

          COMMENT="${ICON} **Gemini Review: ${DECISION}** (Risk: ${RISK})

          ${SUMMARY}
          "

          if [ -n "$ISSUES" ] && [ "$ISSUES" != "" ]; then
            COMMENT="${COMMENT}
          **Issues:**
          - ${ISSUES}
          "
          fi

          if [ -n "$ESCALATION" ] && [ "$ESCALATION" != "" ] && [ "$ESCALATION" != "null" ]; then
            COMMENT="${COMMENT}
          **Escalation reason:** ${ESCALATION}
          "
          fi

          COMMENT="${COMMENT}
          ---
          *Automated review by Gemini 2.0 Flash*"

          # Save comment for next step
          echo "$COMMENT" > /tmp/review_comment.txt

        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          FILES_CHANGED: ${{ github.event.pull_request.changed_files }}
          ADDITIONS: ${{ github.event.pull_request.additions }}
          DELETIONS: ${{ github.event.pull_request.deletions }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post review comment
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/review_comment.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve & merge if APPROVE
        if: steps.review.outputs.decision == 'APPROVE'
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "Auto-approved by Gemini review"
          # Auto-merge (squash to keep history clean)
          gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Request changes if needed
        if: steps.review.outputs.decision == 'REQUEST_CHANGES'
        run: |
          gh pr review ${{ github.event.pull_request.number }} --request-changes --body "Changes requested by Gemini review — see comment above"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Escalate if needed
        if: steps.review.outputs.decision == 'ESCALATE'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "🚨 **Escalation:** This PR needs human review. @socialawy please check."
          gh pr edit ${{ github.event.pull_request.number }} --add-label "needs-human-review" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
