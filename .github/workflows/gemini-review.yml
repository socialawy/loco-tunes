name: Gemini PR Review & Auto-Merge

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    if: "!github.event.pull_request.draft"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr_diff.txt
          head -c 100000 /tmp/pr_diff.txt > /tmp/pr_diff_trimmed.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Gemini Review
        id: review
        run: |
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q '.body' || echo "No description")

          cat > /tmp/prompt.txt <<PROMPTEOF
          You are a senior engineer reviewing code for loco-tunes, a Next.js 16 + TypeScript music generation app using Web Audio API, Zustand, Prisma, and shadcn/ui.

          READ THE DIFF LINE BY LINE. For each changed file, check:
          1. BUGS: null/undefined access, off-by-one errors, race conditions, resource leaks (AudioContext, buffers not released), wrong variable used
          2. TYPE SAFETY: any casts, missing null checks, incorrect generic params, interface mismatches
          3. LOGIC: does the code actually do what the PR description claims? Are edge cases handled?
          4. WEB AUDIO: correct node connection order, proper cleanup of nodes/contexts, sample rate assumptions, timing issues
          5. STATE: Zustand store mutations, stale closures in React hooks, missing dependency arrays
          6. SECURITY: XSS via dangerouslySetInnerHTML, unsanitized user input, exposed secrets

          ISSUES MUST reference the specific file and what is wrong. Not vague observations.
          Bad: "Consider adding error handling" — Good: "engine.ts: createReverb() never disconnects the old reverbNode before reassigning, leaking the previous ConvolverNode"

          Decision rules:
          - APPROVE: You read the diff, found no bugs or logic errors. Minor style preferences are NOT grounds for REQUEST_CHANGES.
          - REQUEST_CHANGES: You found actual bugs, type errors, logic errors, or resource leaks. Each issue must cite file + what is wrong.
          - ESCALATE: Breaking API changes, auth/security changes, data model changes, or you cannot determine correctness from the diff alone.
          - Dependabot/deps PRs: APPROVE if only version bumps in package.json/lockfile with no breaking major version changes.

          Return JSON with keys: decision, summary, issues (array of specific findings with file references), risk_level, escalation_reason.

          PR: ${{ github.event.pull_request.title }}
          Author: ${{ github.event.pull_request.user.login }}
          Changed: ${{ github.event.pull_request.changed_files }} files (+${{ github.event.pull_request.additions }} -${{ github.event.pull_request.deletions }})
          Description: ${PR_BODY}

          Diff:
          PROMPTEOF

          cat /tmp/pr_diff_trimmed.txt >> /tmp/prompt.txt

          # Build payload with responseMimeType to force pure JSON (no code blocks)
          jq -n --rawfile prompt /tmp/prompt.txt '{
            "contents": [{"parts": [{"text": $prompt}]}],
            "generationConfig": {
              "temperature": 0.1,
              "maxOutputTokens": 4096,
              "responseMimeType": "application/json"
            }
          }' > /tmp/payload.json

          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/gemini_response.json \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent?key=${GEMINI_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d @/tmp/payload.json)

          echo "Gemini API HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "decision=ESCALATE" >> "$GITHUB_OUTPUT"
            echo "⚠️ **Gemini Review: ESCALATE** — API error (HTTP $HTTP_CODE)" > /tmp/review_comment.txt
            exit 0
          fi

          # Extract review JSON to file (never store JSON in bash variables)
          jq -r '.candidates[0].content.parts[0].text // "{}"' /tmp/gemini_response.json > /tmp/review.json
          echo "Review JSON:"
          cat /tmp/review.json

          # Parse fields directly from file (set +e so truncated JSON doesn't kill the run)
          set +e
          DECISION=$(jq -r '.decision // "ESCALATE"' /tmp/review.json 2>/dev/null || echo "ESCALATE")
          SUMMARY=$(jq -r '.summary // "Review parsing failed"' /tmp/review.json 2>/dev/null || echo "Review parsing failed")
          RISK=$(jq -r '.risk_level // "unknown"' /tmp/review.json 2>/dev/null || echo "unknown")
          ISSUES=$(jq -r 'if .issues and (.issues | length > 0) then (.issues | map("- " + .) | join("\n")) else "" end' /tmp/review.json 2>/dev/null || echo "")
          ESCALATION=$(jq -r '.escalation_reason // ""' /tmp/review.json 2>/dev/null || echo "")
          set -e

          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"

          if [ "$DECISION" = "APPROVE" ]; then ICON="✅";
          elif [ "$DECISION" = "REQUEST_CHANGES" ]; then ICON="🔧";
          else ICON="⚠️"; fi

          {
            echo "${ICON} **Gemini Review: ${DECISION}** (Risk: ${RISK})"
            echo ""
            echo "${SUMMARY}"
            if [ -n "$ISSUES" ]; then
              echo ""
              echo "**Issues:**"
              echo "${ISSUES}"
            fi
            if [ -n "$ESCALATION" ] && [ "$ESCALATION" != "null" ]; then
              echo ""
              echo "**Escalation reason:** ${ESCALATION}"
            fi
            echo ""
            echo "---"
            echo "*Automated review by Gemini 2.5 Flash*"
          } > /tmp/review_comment.txt

        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post review comment
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/review_comment.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve & merge if APPROVE
        if: steps.review.outputs.decision == 'APPROVE'
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "Auto-approved by Gemini review"
          gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Request changes if needed
        if: steps.review.outputs.decision == 'REQUEST_CHANGES'
        run: gh pr review ${{ github.event.pull_request.number }} --request-changes --body "Changes requested by Gemini review — see comment above"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Escalate if needed
        if: steps.review.outputs.decision == 'ESCALATE'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "🚨 **Escalation:** This PR needs human review. @socialawy please check."
          gh pr edit ${{ github.event.pull_request.number }} --add-label "needs-human-review" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
